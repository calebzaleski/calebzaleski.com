<!DOCTYPE html>
<html lang="en">



<head>
  <meta charset="UTF-8">
  <title>Admin | Caleb Zaleski</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="images/cz.png">

  <style>
    .content {
      text-align: center;
    }

  </style>
</head>
<body>

<div id="navbar"></div>

<div class="todocontent">
  <h1>3D Printing</h1>
  <p>
    Here you can find everything that I am working on for my Creality Ender 5 3D printer at home.
  </p>


  <div class="todowrapper">
    <div class="tasklist">
      <input class="taskInput" type="text" placeholder="Enter task...">
      <button class="addTaskBtn">Add Task</button>
      <button class="deleteCompletedBtn">Delete Completed Tasks</button>
      <div class="tasklist" id="threedprinting_list"></div>
    </div>
  </div>

</div>


<div class="todocontent">
  <h1>Stir It Up</h1>
  <p>
  </p>


  <div class="todowrapper">
    <div class="tasklist">
      <input class="taskInput" type="text" placeholder="Enter task...">
      <button class="addTaskBtn">Add Task</button>
      <button class="deleteCompletedBtn">Delete Completed Tasks</button>
      <div class="tasklist" id="stir_it_up_list"></div>
    </div>
  </div>

</div>

<div class="todocontent">
  <h1>Website</h1>
  <p>
  </p>


  <div class="todowrapper">
    <div class="tasklist">
      <input class="taskInput" type="text" placeholder="Enter task...">
      <button class="addTaskBtn">Add Task</button>
      <button class="deleteCompletedBtn">Delete Completed Tasks</button>
      <div class="tasklist" id="website_list"></div>
    </div>
  </div>

</div>



<script src="Index.js"></script>
<script src="tasklist.js"></script>
<script>
  // For each .todowrapper, call initTodoPage with the wrapper and corresponding table id
  document.querySelectorAll('.todowrapper').forEach(wrapper => {
    // The div inside wrapper with the actual table id
    const tableDiv = wrapper.querySelector('div[id]');
    if (tableDiv) {
      initTodoPage(wrapper, tableDiv.id);
    }
  });
</script>

</body>
</html>
